# Railway deploy config — agentic-app-template (OpenAI Agents SDK)
#
# This template deploys as FOUR Railway services from a single repo:
#
#   agent  → servers/agent          — OpenAI Agents SDK backend (HTTP API + sandbox-proxy)
#   ggui   → servers/ggui           — `ggui serve` MCP server (renders UI on the agent's behalf)
#   todo   → servers/mcps/todo      — sample domain MCP server (todo CRUD)
#   web    → apps/web               — Vite SPA frontend
#
# Railway wires services together via `${{<svc>.PRIVATE_DOMAIN}}` (internal
# Railway DNS, IPv6, no egress cost). Each service builds from the monorepo
# root and starts via its own `pnpm --filter` command.
#
# How to deploy:
#   1. Create a new Railway project from this repo.
#   2. Create FOUR services in the project, one per [services.<name>] block below.
#      Railway's "deploy from repo" flow picks up these settings automatically.
#   3. Set the secrets noted under [services.agent.env] / [services.ggui.env] —
#      your OPENAI_API_KEY for the agent + ANTHROPIC_API_KEY for ggui in this
#      default template (ggui generates UI via Claude; swap providers via ggui.json).
#   4. Open the web service's public URL.
#
# Future: when guuey.com ships, drop a `guuey.json` next to this file. Railway
# stays as a fallback for self-hosters who want raw IaaS.

[build]
builder = "NIXPACKS"

# ── agent ────────────────────────────────────────────────────────────────
# The SDK-specific backend. Public — fronts both the SSE chat stream and
# the relay/snapshot endpoints the SPA hits from the browser.
[services.agent]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./servers/agent build"
startCommand = "pnpm --filter ./servers/agent start"

[services.agent.env]
PORT = "6791"
GGUI_MCP_URL = "https://${{ggui.PRIVATE_DOMAIN}}:${{ggui.PORT}}/mcp"
GGUI_TODO_MCP_URL = "https://${{todo.PRIVATE_DOMAIN}}:${{todo.PORT}}/mcp"
# Required secret — set in Railway dashboard.
# OPENAI_API_KEY = "sk-..."

# ── ggui ─────────────────────────────────────────────────────────────────
# `ggui serve` — generates and serves the UI the agent renders. Public so
# the SPA (running in the user's browser) can iframe its /r/<shortCode>
# routes directly.
[services.ggui]
buildCommand = "pnpm install --frozen-lockfile"
startCommand = "pnpm --filter ./servers/ggui start"

[services.ggui.env]
PORT = "6781"
# ggui's own LLM-driven UI generator needs an LLM key. Default ggui.json
# picks Claude — set ANTHROPIC_API_KEY (or change the model in ggui.json).
# ANTHROPIC_API_KEY = "sk-ant-..."

# ── todo (sample domain MCP) ─────────────────────────────────────────────
# Replace this block with your own MCP servers as your app grows. Private
# (no public domain) — only the agent talks to it.
[services.todo]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./servers/mcps/todo build"
startCommand = "pnpm --filter ./servers/mcps/todo start"

[services.todo.env]
PORT = "6782"

# ── web (frontend SPA) ───────────────────────────────────────────────────
# Vite build → `vite preview` (or any static-host adapter). Public.
[services.web]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter ./apps/web build"
startCommand = "pnpm --filter ./apps/web preview --host 0.0.0.0 --port $PORT"

[services.web.env]
PORT = "6890"
# Vite-prefixed so the value is inlined into the browser bundle at build time.
VITE_AGENT_ENDPOINT_URL = "https://${{agent.RAILWAY_PUBLIC_DOMAIN}}"
